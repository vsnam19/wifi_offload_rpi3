# netservice.cfg — kernel config fragment for WiFi Offload Manager
# Applied via linux-raspberrypi bbappend on top of the BSP defconfig.
# All options required; bitbake -c kernel_configcheck will verify them.

# ── MPTCP ────────────────────────────────────────────────────────
CONFIG_MPTCP=y
CONFIG_INET_MPTCP_DIAG=y

# ── cgroup net_cls — process-level traffic classification ─────────
CONFIG_CGROUP_NET_CLASSID=y
CONFIG_CGROUP_NET_PRIO=y

# ── netfilter — classid→fwmark and mark matching ─────────────────
CONFIG_NETFILTER_XT_MATCH_CGROUP=y
CONFIG_NETFILTER_XT_TARGET_MARK=y
CONFIG_NETFILTER_XT_MATCH_MARK=y

# ── Policy routing — multiple routing tables + fwmark rules ───────
CONFIG_IP_MULTIPLE_TABLES=y
CONFIG_IP_ROUTE_MULTIPATH=y
CONFIG_IP_ADVANCED_ROUTER=y

# ── WiFi (onboard brcmfmac) ───────────────────────────────────────
CONFIG_MAC80211=y
CONFIG_CFG80211=y

# ── LTE modem USB support (for production wwan0/wwan1) ───────────
CONFIG_USB_SERIAL=y
CONFIG_USB_SERIAL_OPTION=y
CONFIG_USB_NET_QMI_WWAN=y
CONFIG_USB_WDM=y
CONFIG_USB_NET_CDCETHER=y
CONFIG_USB_NET_RNDIS_HOST=y
CONFIG_USB_NET_CDC_NCM=y
