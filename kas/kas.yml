# WiFi Offload Manager — Main kas build configuration
# Target: Raspberry Pi 3B+ (prototype), Yocto Scarthgap 5.0
# Usage: kas build kas/kas.yml
#
# To switch machine, override: kas build kas/kas.yml:kas/machine/<machine>.yml
# (current default is rpi3 via includes below)

header:
  version: 14
  includes:
    - kas/machine/rpi3.yml

distro: poky
target: netservice-image

build_system: oe

repos:
  poky:
    url: https://git.yoctoproject.org/poky
    branch: scarthgap
    layers:
      meta:
      meta-poky:
      meta-yocto-bsp:

  meta-openembedded:
    url: https://github.com/openembedded/meta-openembedded
    branch: scarthgap
    layers:
      meta-oe:
      meta-networking:
      meta-python:
      meta-filesystems:

  meta-raspberrypi:
    url: https://git.yoctoproject.org/meta-raspberrypi
    branch: scarthgap
    layers:
      .:  # layer conf is at repo root, not in a meta-raspberrypi/ subdir

  meta-netservice:
    path: meta-netservice
    layers:
      .:  # layer conf is at path root (meta-netservice/conf/layer.conf)

local_conf_header:
  standard: |
    CONF_VERSION = "2"

    # Use IPK packages — lightweight for embedded targets
    PACKAGE_CLASSES = "package_ipk"

    # Development image features; remove debug-tweaks for production
    EXTRA_IMAGE_FEATURES ?= "debug-tweaks ssh-server-openssh"

    # ── systemd as init manager ───────────────────────────────────
    # poky distro defaults to sysvinit; these three lines switch it to systemd.
    # usrmerge is required by systemd in Scarthgap (merged /usr layout).
    DISTRO_FEATURES:append = " systemd usrmerge"
    VIRTUAL-RUNTIME_init_manager = "systemd"
    VIRTUAL-RUNTIME_initscripts = "systemd-compat-units"
    # ── Firmware license acceptance ──────────────────────────────────
    # RPi3B+ onboard BCM43430 WiFi chip uses linux-firmware-rpidistro which
    # carries a 'synaptics-killswitch' restricted license.  Must be explicitly
    # accepted to build the firmware package.
    LICENSE_FLAGS_ACCEPTED:append = " synaptics-killswitch"

    # ── cgroup v1 net_cls — required by routing_policy_manager ──────
    # Kernel ≥ 6.x defaults to cgroup v2 (unified). Force legacy cgroup v1
    # so /sys/fs/cgroup/net_cls/ is mounted and net_cls classids are available.
    CMDLINE:append = " systemd.unified_cgroup_hierarchy=0 cgroup_enable=net_cls,memory"
    USER_CLASSES ?= "buildstats"
    PATCHRESOLVE = "noop"

    # Disk space guards — abort before the build host runs out of space
    BB_DISKMON_DIRS ??= "\
      STOPTASKS,${TMPDIR},1G,100K \
      STOPTASKS,${DL_DIR},1G,100K \
      STOPTASKS,${SSTATE_DIR},1G,100K \
      STOPTASKS,/tmp,100M,100K \
      HALT,${TMPDIR},100M,1K \
      HALT,${DL_DIR},100M,1K \
      HALT,${SSTATE_DIR},100M,1K \
      HALT,/tmp,10M,1K \
    "
